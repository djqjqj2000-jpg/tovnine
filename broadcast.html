<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>토브나인 주차 안내방송</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#FAFAFB;
  --bg2:#F4F4F7;
  --bg3:#EAEAEF;
  --surface:#FFFFFF;
  --border:#E5E5EB;
  --border-strong:#D1D1DA;
  --text:#15161B;
  --text2:#5E6068;
  --text3:#9B9DA5;
  --accent:#3730A3;
  --accent-soft:#4F46BA;
  --accent-bg:#EAE9F7;
  --accent-bg2:#D8D6F0;
  --danger:#B91C1C;
  --danger-bg:#FEE4E4;
  --success:#0E7C5A;
  --success-bg:#E0F2EA;
}
html, body{
  width:100%;
  height:100%;
  overflow:hidden;
}
body{
  font-family:'Pretendard','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:14px;
  background:var(--bg2);
  color:var(--text);
  -webkit-tap-highlight-color:transparent;
  -webkit-font-smoothing:antialiased;
  font-feature-settings:'tnum' 1;
  letter-spacing:-0.01em;
  user-select:none;
  -webkit-user-select:none;
}

/* 전체 컨테이너 - 가로 모드 풀스크린 */
.app{
  width:100vw;
  height:100vh;
  padding:16px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

/* ─────── 좌측 패널 ─────── */
.left-panel{
  display:flex;
  flex-direction:column;
  gap:12px;
  min-height:0;
}

/* 헤더 */
.hdr{
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-shrink:0;
}
.hdr h1{
  font-size:22px;
  font-weight:700;
  color:var(--text);
  letter-spacing:-0.04em;
  line-height:1.2;
}
.hdr p{
  font-size:11px;
  color:var(--text2);
  margin-top:3px;
  font-family:'JetBrains Mono',monospace;
}
.brand-badge{
  font-size:10px;
  color:var(--text3);
  font-family:'JetBrains Mono',monospace;
  padding:5px 10px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:6px;
}

/* 차량번호 표시 영역 */
.plate-section{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:14px 16px;
  flex-shrink:0;
}
.section-label{
  font-size:10px;
  color:var(--text3);
  font-weight:500;
  text-transform:uppercase;
  letter-spacing:0.05em;
  margin-bottom:10px;
  text-align:center;
}
.plate-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}
.plate-cell{
  aspect-ratio:1;
  background:var(--bg2);
  color:var(--text3);
  border:2px solid var(--border);
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:42px;
  font-weight:700;
  font-family:'JetBrains Mono',monospace;
  transition:all 0.15s;
}
.plate-cell.filled{
  background:var(--accent);
  color:#FFFFFF;
  border-color:var(--accent);
}
.plate-cell.next{
  border-color:var(--accent);
  border-style:dashed;
  background:var(--accent-bg);
}

/* 미리보기 영역 */
.preview-section{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px 14px;
  flex:1;
  min-height:0;
  display:flex;
  flex-direction:column;
}
.preview-text{
  font-size:13px;
  color:var(--text);
  line-height:1.7;
  flex:1;
  display:flex;
  align-items:center;
}
.plate-inline{
  background:var(--accent-bg);
  color:var(--accent);
  font-weight:600;
  padding:2px 8px;
  border-radius:5px;
  font-family:'JetBrains Mono',monospace;
  letter-spacing:0.15em;
  white-space:nowrap;
  display:inline-block;
}
.plate-inline.empty{
  background:var(--bg3);
  color:var(--text3);
}

/* 방송 시작 버튼 */
.broadcast-btn{
  width:100%;
  padding:18px;
  background:var(--accent);
  color:#FFFFFF;
  border:none;
  border-radius:10px;
  font-family:inherit;
  font-size:17px;
  font-weight:600;
  letter-spacing:-0.01em;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  flex-shrink:0;
  transition:all 0.15s;
}
.broadcast-btn:hover{
  background:var(--accent-soft);
}
.broadcast-btn:active{
  transform:scale(0.98);
}
.broadcast-btn:disabled{
  background:var(--text3);
  cursor:not-allowed;
  opacity:0.6;
  transform:none;
}
.broadcast-btn.playing{
  background:var(--success);
  cursor:wait;
}
.broadcast-icon{
  font-size:20px;
  line-height:1;
}

/* ─────── 우측 패널: 숫자패드 ─────── */
.right-panel{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:14px;
  display:flex;
  flex-direction:column;
  min-height:0;
}
.keypad{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(4,1fr);
  gap:10px;
  flex:1;
  min-height:0;
}
.key{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:10px;
  font-family:'JetBrains Mono',monospace;
  font-size:32px;
  font-weight:600;
  color:var(--text);
  cursor:pointer;
  transition:all 0.1s;
  display:flex;
  align-items:center;
  justify-content:center;
}
.key:hover{
  background:var(--bg3);
  border-color:var(--border-strong);
}
.key:active{
  transform:scale(0.95);
  background:var(--accent-bg);
  border-color:var(--accent);
}
.key.action{
  font-family:'Pretendard',sans-serif;
  font-size:14px;
  font-weight:600;
  color:var(--text2);
}
.key.action.danger{
  color:var(--danger);
}
.key.action .key-icon{
  font-size:22px;
  line-height:1;
}
.key:disabled{
  opacity:0.4;
  cursor:not-allowed;
}

/* 토스트 */
.toast{
  position:fixed;
  bottom:24px;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  background:#1a1a1a;
  color:#FFFFFF;
  font-size:13px;
  padding:11px 22px;
  border-radius:24px;
  opacity:0;
  transition:all 0.25s;
  pointer-events:none;
  z-index:100;
  white-space:nowrap;
  font-family:inherit;
  letter-spacing:-0.01em;
}
.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

/* 작은 화면 대응 */
@media (max-height:500px){
  .app{padding:10px;gap:10px;}
  .hdr h1{font-size:18px;}
  .plate-cell{font-size:32px;}
  .key{font-size:26px;}
  .broadcast-btn{padding:14px;font-size:15px;}
}

/* 매우 좁은 가로 화면(세로 모드 등) - 위아래로 전환 */
@media (orientation:portrait){
  .app{
    grid-template-columns:1fr;
    grid-template-rows:auto 1fr;
  }
}
</style>
</head>
<body>

<div class="app">

  <!-- ═══════ 좌측: 정보 영역 ═══════ -->
  <div class="left-panel">
    
    <div class="hdr">
      <div>
        <h1>주차 안내방송</h1>
        <p>Parking Announcement</p>
      </div>
      <div class="brand-badge">toV9</div>
    </div>

    <div class="plate-section">
      <div class="section-label">차량번호 뒷자리 4자리</div>
      <div class="plate-grid" id="plate-grid">
        <div class="plate-cell next" data-idx="0"></div>
        <div class="plate-cell" data-idx="1"></div>
        <div class="plate-cell" data-idx="2"></div>
        <div class="plate-cell" data-idx="3"></div>
      </div>
    </div>

    <div class="preview-section">
      <div class="section-label" style="text-align:left;">방송 미리보기</div>
      <div class="preview-text">
        토브나인을 찾아주신 고객님께 안내드립니다. 차량번호 <span class="plate-inline empty" id="plate-inline">_ _ _ _</span> 차주님, 잠시 차량 이동을 부탁드립니다. 오늘도 토브나인에서 행복하세요.
      </div>
    </div>

    <button class="broadcast-btn" id="broadcast-btn" disabled onclick="startBroadcast()">
      <span class="broadcast-icon">📢</span>
      <span id="broadcast-btn-text">방송 시작</span>
    </button>

  </div>

  <!-- ═══════ 우측: 숫자패드 ═══════ -->
  <div class="right-panel">
    <div class="keypad" id="keypad">
      <button class="key" onclick="pressKey('1')">1</button>
      <button class="key" onclick="pressKey('2')">2</button>
      <button class="key" onclick="pressKey('3')">3</button>
      <button class="key" onclick="pressKey('4')">4</button>
      <button class="key" onclick="pressKey('5')">5</button>
      <button class="key" onclick="pressKey('6')">6</button>
      <button class="key" onclick="pressKey('7')">7</button>
      <button class="key" onclick="pressKey('8')">8</button>
      <button class="key" onclick="pressKey('9')">9</button>
      <button class="key action" onclick="pressBackspace()" aria-label="한 자리 지우기">
        <span class="key-icon">⌫</span>
      </button>
      <button class="key" onclick="pressKey('0')">0</button>
      <button class="key action danger" onclick="pressClear()">전체삭제</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════════
   설정값
══════════════════════════════════════════ */
// 차량번호를 두 번 반복 재생할지 여부
// false = 한 번만, true = 두 번 반복
const REPEAT_NUMBERS = false;

// 음원 사이 텀(ms)
const GAP_AFTER_CHIME = 300;       // 차임벨 → 인트로
const GAP_AFTER_INTRO = 200;       // 인트로 → 첫 숫자
const GAP_BETWEEN_DIGITS = 200;    // 숫자 간 텀
const GAP_BEFORE_REPEAT = 600;     // 첫 번째 숫자 그룹 → 두 번째 숫자 그룹
const GAP_BEFORE_OUTRO = 300;      // 마지막 숫자 → 아웃트로

// 음원 경로 (broadcast.html 위치 기준 상대 경로)
const AUDIO = {
  chime: 'audio/chime.mp3',
  intro: 'audio/intro.mp3',
  outro: 'audio/outro.mp3',
  '0': 'audio/0.mp3',
  '1': 'audio/1.mp3',
  '2': 'audio/2.mp3',
  '3': 'audio/3.mp3',
  '4': 'audio/4.mp3',
  '5': 'audio/5.mp3',
  '6': 'audio/6.mp3',
  '7': 'audio/7.mp3',
  '8': 'audio/8.mp3',
  '9': 'audio/9.mp3',
};

/* ══════════════════════════════════════════
   상태
══════════════════════════════════════════ */
let plateDigits = ['', '', '', ''];  // 입력된 4자리
let isPlaying = false;                // 재생 중 여부
let audioCache = {};                  // 미리 로드한 Audio 객체

/* ══════════════════════════════════════════
   오디오 사전 로드 (페이지 진입 즉시)
   - 첫 재생 지연을 줄이기 위해 모든 음원을 미리 다운로드
══════════════════════════════════════════ */
function preloadAudio(){
  Object.entries(AUDIO).forEach(([key, path]) => {
    const audio = new Audio(path);
    audio.preload = 'auto';
    audio.load();
    audioCache[key] = audio;
  });
}

/* ══════════════════════════════════════════
   숫자패드 입력
══════════════════════════════════════════ */
function pressKey(digit){
  if(isPlaying) return;
  
  // 4자리 다 찼으면 무시
  const filledIdx = plateDigits.findIndex(d => d === '');
  if(filledIdx === -1) return;
  
  plateDigits[filledIdx] = digit;
  renderPlate();
  updateBroadcastBtn();
}

function pressBackspace(){
  if(isPlaying) return;
  
  // 마지막으로 채워진 자리 찾아서 지우기
  for(let i = plateDigits.length - 1; i >= 0; i--){
    if(plateDigits[i] !== ''){
      plateDigits[i] = '';
      break;
    }
  }
  renderPlate();
  updateBroadcastBtn();
}

function pressClear(){
  if(isPlaying) return;
  plateDigits = ['', '', '', ''];
  renderPlate();
  updateBroadcastBtn();
}

/* ══════════════════════════════════════════
   화면 갱신
══════════════════════════════════════════ */
function renderPlate(){
  // 차량번호 4칸
  const cells = document.querySelectorAll('.plate-cell');
  const nextIdx = plateDigits.findIndex(d => d === '');
  
  cells.forEach((cell, idx) => {
    cell.textContent = plateDigits[idx];
    cell.classList.remove('filled', 'next');
    if(plateDigits[idx] !== ''){
      cell.classList.add('filled');
    } else if(idx === nextIdx){
      cell.classList.add('next');
    }
  });
  
  // 미리보기 영역의 차량번호 표시
  const inline = document.getElementById('plate-inline');
  const allFilled = plateDigits.every(d => d !== '');
  if(allFilled){
    inline.textContent = plateDigits.join(' ');
    inline.classList.remove('empty');
  } else {
    // 빈 자리는 _ 로 표시
    const display = plateDigits.map(d => d === '' ? '_' : d).join(' ');
    inline.textContent = display;
    inline.classList.add('empty');
  }
}

function updateBroadcastBtn(){
  const btn = document.getElementById('broadcast-btn');
  const allFilled = plateDigits.every(d => d !== '');
  btn.disabled = !allFilled || isPlaying;
}

/* ══════════════════════════════════════════
   방송 재생
══════════════════════════════════════════ */
async function startBroadcast(){
  if(isPlaying) return;
  if(plateDigits.some(d => d === '')) return;
  
  isPlaying = true;
  updatePlayingUI(true);
  
  try{
    // 1. 차임벨
    await playAudio('chime');
    await wait(GAP_AFTER_CHIME);
    
    // 2. 인트로 멘트
    await playAudio('intro');
    await wait(GAP_AFTER_INTRO);
    
    // 3. 차량번호 4자리
    await playDigits();
    
    // 4. 두 번 반복 옵션
    if(REPEAT_NUMBERS){
      await wait(GAP_BEFORE_REPEAT);
      await playDigits();
    }
    
    await wait(GAP_BEFORE_OUTRO);
    
    // 5. 아웃트로 멘트
    await playAudio('outro');
    
    showToast('방송 완료');
    
    // 자동으로 차량번호 초기화 (다음 방송 준비)
    setTimeout(() => {
      plateDigits = ['', '', '', ''];
      renderPlate();
      isPlaying = false;
      updatePlayingUI(false);
      updateBroadcastBtn();
    }, 800);
    
  }catch(e){
    showToast('⚠ 재생 실패: ' + e.message);
    isPlaying = false;
    updatePlayingUI(false);
    updateBroadcastBtn();
  }
}

async function playDigits(){
  for(let i = 0; i < plateDigits.length; i++){
    await playAudio(plateDigits[i]);
    if(i < plateDigits.length - 1){
      await wait(GAP_BETWEEN_DIGITS);
    }
  }
}

function playAudio(key){
  return new Promise((resolve, reject) => {
    const cached = audioCache[key];
    if(!cached){
      reject(new Error('음원을 찾을 수 없음: ' + key));
      return;
    }
    
    // 같은 인스턴스를 재사용하지 않고 새로 만들어 재생
    // (캐시는 다운로드용, 재생은 별도 인스턴스가 안전)
    const audio = new Audio(cached.src);
    audio.volume = 1.0;
    
    audio.addEventListener('ended', () => resolve(), {once:true});
    audio.addEventListener('error', (e) => {
      reject(new Error('음원 재생 오류: ' + key));
    }, {once:true});
    
    audio.play().catch(err => {
      reject(new Error('재생 권한 문제: ' + err.message));
    });
  });
}

function wait(ms){
  return new Promise(resolve => setTimeout(resolve, ms));
}

function updatePlayingUI(playing){
  const btn = document.getElementById('broadcast-btn');
  const text = document.getElementById('broadcast-btn-text');
  const keypad = document.getElementById('keypad');
  
  if(playing){
    btn.classList.add('playing');
    btn.disabled = true;
    text.textContent = '방송 중...';
    // 숫자패드 비활성화 (시각적 피드백)
    keypad.querySelectorAll('button').forEach(b => b.disabled = true);
  } else {
    btn.classList.remove('playing');
    text.textContent = '방송 시작';
    keypad.querySelectorAll('button').forEach(b => b.disabled = false);
  }
}

/* ══════════════════════════════════════════
   토스트
══════════════════════════════════════════ */
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

/* ══════════════════════════════════════════
   키보드 입력 지원 (PC에서 테스트 시 편의)
══════════════════════════════════════════ */
document.addEventListener('keydown', (e) => {
  if(isPlaying) return;
  
  if(e.key >= '0' && e.key <= '9'){
    pressKey(e.key);
  } else if(e.key === 'Backspace'){
    pressBackspace();
  } else if(e.key === 'Escape' || e.key === 'Delete'){
    pressClear();
  } else if(e.key === 'Enter'){
    const btn = document.getElementById('broadcast-btn');
    if(!btn.disabled) startBroadcast();
  }
});

/* ══════════════════════════════════════════
   초기화
══════════════════════════════════════════ */
preloadAudio();
renderPlate();
updateBroadcastBtn();

// 화면 자동 잠금 방지 시도 (Wake Lock API)
async function preventScreenLock(){
  if('wakeLock' in navigator){
    try{
      await navigator.wakeLock.request('screen');
    }catch(e){/* 무시 — 권한 없거나 미지원 */}
  }
}
preventScreenLock();
// 사용자 인터랙션 후 다시 시도 (어떤 브라우저는 첫 인터랙션 후에만 허용)
document.addEventListener('click', preventScreenLock, {once:true});

</script>
</body>
</html>
