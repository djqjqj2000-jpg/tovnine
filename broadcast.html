<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>토브나인 주차 안내방송</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#FAFAFB;
  --bg2:#F4F4F7;
  --bg3:#EAEAEF;
  --surface:#FFFFFF;
  --border:#E5E5EB;
  --border-strong:#D1D1DA;
  --text:#15161B;
  --text2:#5E6068;
  --text3:#9B9DA5;
  --accent:#3730A3;
  --accent-soft:#4F46BA;
  --accent-bg:#EAE9F7;
  --accent-bg2:#D8D6F0;
  --danger:#B91C1C;
  --success:#0E7C5A;
}
html, body{
  width:100%;
  height:100%;
  overflow:hidden;
}
body{
  font-family:'Pretendard','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg2);
  color:var(--text);
  -webkit-tap-highlight-color:transparent;
  -webkit-font-smoothing:antialiased;
  font-feature-settings:'tnum' 1;
  letter-spacing:-0.01em;
  user-select:none;
  -webkit-user-select:none;
}

.app{
  width:100vw;
  height:100vh;
  height:100dvh;
  padding:1.5vh 1.5vw;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1.2vw;
  overflow:hidden;
}

.left-panel{
  display:flex;
  flex-direction:column;
  gap:1.2vh;
  min-height:0;
  overflow:hidden;
}

.hdr{
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-shrink:0;
  padding:0 0.5vw;
}
.hdr h1{
  font-size:clamp(18px, 3.5vh, 32px);
  font-weight:700;
  color:var(--text);
  letter-spacing:-0.04em;
  line-height:1.2;
}
.hdr p{
  font-size:clamp(10px, 1.5vh, 14px);
  color:var(--text2);
  margin-top:0.3vh;
  font-family:'JetBrains Mono',monospace;
}
.brand-badge{
  font-size:clamp(10px, 1.5vh, 13px);
  color:var(--text3);
  font-family:'JetBrains Mono',monospace;
  padding:0.8vh 1.2vw;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  font-weight:600;
}

.plate-section{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:1.5vh 1.5vw;
  flex-shrink:0;
}
.section-label{
  font-size:clamp(9px, 1.3vh, 13px);
  color:var(--text3);
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:0.05em;
  margin-bottom:1vh;
  text-align:center;
}
.plate-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:0.8vw;
}
.plate-cell{
  height:clamp(55px, 11vh, 110px);
  background:var(--bg2);
  color:var(--text3);
  border:2px solid var(--border);
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(36px, 8vh, 72px);
  font-weight:700;
  font-family:'JetBrains Mono',monospace;
  transition:all 0.15s;
}
.plate-cell.filled{
  background:var(--accent);
  color:#FFFFFF;
  border-color:var(--accent);
}
.plate-cell.next{
  border-color:var(--accent);
  border-style:dashed;
  background:var(--accent-bg);
}

.preview-section{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:1.5vh 1.5vw;
  flex:1;
  min-height:60px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.preview-section .section-label{
  text-align:left;
  margin-bottom:1vh;
}
.preview-text{
  font-size:clamp(13px, 2.2vh, 22px);
  color:var(--text);
  line-height:1.6;
  flex:1;
  display:flex;
  align-items:center;
  font-weight:500;
  overflow:hidden;
}
.plate-inline{
  background:var(--accent-bg);
  color:var(--accent);
  font-weight:700;
  padding:0.3vh 0.8vw;
  border-radius:8px;
  font-family:'JetBrains Mono',monospace;
  letter-spacing:0.15em;
  white-space:nowrap;
  display:inline-block;
  vertical-align:middle;
  font-size:clamp(14px, 2.4vh, 24px);
}
.plate-inline.empty{
  background:var(--bg3);
  color:var(--text3);
  letter-spacing:0.2em;
}

.broadcast-btn{
  width:100%;
  padding:clamp(14px, 2.5vh, 24px);
  background:var(--accent);
  color:#FFFFFF;
  border:none;
  border-radius:12px;
  font-family:inherit;
  font-size:clamp(15px, 2.5vh, 22px);
  font-weight:700;
  letter-spacing:-0.01em;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  flex-shrink:0;
  transition:all 0.15s;
}
.broadcast-btn:hover{background:var(--accent-soft);}
.broadcast-btn:active{transform:scale(0.98);}
.broadcast-btn:disabled{
  background:var(--text3);
  cursor:not-allowed;
  opacity:0.6;
  transform:none;
}
.broadcast-btn.playing{
  background:var(--success);
  cursor:wait;
}
.broadcast-icon{
  font-size:clamp(18px, 3vh, 26px);
  line-height:1;
}

.right-panel{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:1.2vh 1vw;
  display:flex;
  flex-direction:column;
  min-height:0;
  overflow:hidden;
}
.keypad{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(4,1fr);
  gap:0.8vh;
  flex:1;
  min-height:0;
}
.key{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:12px;
  font-family:'JetBrains Mono',monospace;
  font-size:clamp(28px, 6vh, 56px);
  font-weight:600;
  color:var(--text);
  cursor:pointer;
  transition:all 0.1s;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:0;
  padding:0;
}
.key:hover{
  background:var(--bg3);
  border-color:var(--border-strong);
}
.key:active{
  transform:scale(0.95);
  background:var(--accent-bg);
  border-color:var(--accent);
}
.key.action{
  font-family:'Pretendard',sans-serif;
  font-size:clamp(13px, 2.2vh, 20px);
  font-weight:600;
  color:var(--text2);
}
.key.action.danger{color:var(--danger);}
.key.action .key-icon{
  font-size:clamp(20px, 4vh, 36px);
  line-height:1;
}
.key:disabled{
  opacity:0.4;
  cursor:not-allowed;
}

.toast{
  position:fixed;
  bottom:3vh;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  background:#1a1a1a;
  color:#FFFFFF;
  font-size:clamp(12px, 2vh, 16px);
  padding:1.2vh 2.5vw;
  border-radius:28px;
  opacity:0;
  transition:all 0.25s;
  pointer-events:none;
  z-index:100;
  white-space:nowrap;
  font-family:inherit;
  letter-spacing:-0.01em;
  font-weight:500;
}
.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

@media (orientation:portrait){
  .app{
    grid-template-columns:1fr;
    grid-template-rows:auto 1fr;
  }
  .plate-cell{
    height:clamp(50px, 9vh, 90px);
    font-size:clamp(32px, 6vh, 56px);
  }
}
</style>
</head>
<body>

<div class="app">

  <div class="left-panel">
    
    <div class="hdr">
      <div>
        <h1>주차 안내방송</h1>
        <p>Parking Announcement</p>
      </div>
      <div class="brand-badge">toV9</div>
    </div>

    <div class="plate-section">
      <div class="section-label">차량번호 뒷자리 4자리</div>
      <div class="plate-grid" id="plate-grid">
        <div class="plate-cell next" data-idx="0"></div>
        <div class="plate-cell" data-idx="1"></div>
        <div class="plate-cell" data-idx="2"></div>
        <div class="plate-cell" data-idx="3"></div>
      </div>
    </div>

    <div class="preview-section">
      <div class="section-label">방송 미리보기</div>
      <div class="preview-text">
        <span>토브나인을 찾아주신 고객님께 안내드립니다. 차량번호 <span class="plate-inline empty" id="plate-inline">_ _ _ _</span> 차주님, 잠시 차량 이동을 부탁드립니다. 오늘도 토브나인에서 행복하세요.</span>
      </div>
    </div>

    <button class="broadcast-btn" id="broadcast-btn" disabled onclick="startBroadcast()">
      <span class="broadcast-icon">📢</span>
      <span id="broadcast-btn-text">방송 시작</span>
    </button>

  </div>

  <div class="right-panel">
    <div class="keypad" id="keypad">
      <button class="key" onclick="pressKey('1')">1</button>
      <button class="key" onclick="pressKey('2')">2</button>
      <button class="key" onclick="pressKey('3')">3</button>
      <button class="key" onclick="pressKey('4')">4</button>
      <button class="key" onclick="pressKey('5')">5</button>
      <button class="key" onclick="pressKey('6')">6</button>
      <button class="key" onclick="pressKey('7')">7</button>
      <button class="key" onclick="pressKey('8')">8</button>
      <button class="key" onclick="pressKey('9')">9</button>
      <button class="key action" onclick="pressBackspace()" aria-label="한 자리 지우기">
        <span class="key-icon">⌫</span>
      </button>
      <button class="key" onclick="pressKey('0')">0</button>
      <button class="key action danger" onclick="pressClear()">전체삭제</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const REPEAT_NUMBERS = true;

const TRIM_CHIME = 200;
const TRIM_INTRO = 350;
const TRIM_DIGIT = 280;
const TRIM_LAST_DIGIT = 200;
const TRIM_LAST_DIGIT_FIRST_GROUP = 100;
const TRIM_OUTRO = 0;

/* ══════════════════════════════════════════
   ★ 음량 증폭 설정 (Web Audio API GainNode 사용)
   - GAIN_GLOBAL: 모든 음원에 공통 적용되는 기본 게인
   - GAIN_BOOST: 특정 음원에 추가로 적용되는 게인
   - 최종 게인 = GAIN_GLOBAL × GAIN_BOOST[key]
   - 1.0 = 원본 음량, 1.5 = 1.5배, 2.0 = 2배
   - 너무 키우면 클리핑(찢어지는 소리) 발생 가능
══════════════════════════════════════════ */
const GAIN_GLOBAL = 1.8;  // ★ 1.5 → 1.8 (전체 음량 1.2배 추가 증폭)

// 특정 음원만 추가 부스트 (없으면 1.0배 = 추가 부스트 없음)
const GAIN_BOOST = {
  '0': 1.2,  // "영"
  '2': 1.2,  // "이"
  '5': 1.2,  // "오"
  '9': 1.2,  // "구"
};

const AUDIO = {
  chime: 'audio/chime.mp3',
  intro: 'audio/intro.mp3',
  outro: 'audio/outro.mp3',
  '0': 'audio/0.mp3',
  '1': 'audio/1.mp3',
  '2': 'audio/2.mp3',
  '3': 'audio/3.mp3',
  '4': 'audio/4.mp3',
  '5': 'audio/5.mp3',
  '6': 'audio/6.mp3',
  '7': 'audio/7.mp3',
  '8': 'audio/8.mp3',
  '9': 'audio/9.mp3',
};

let plateDigits = ['', '', '', ''];
let isPlaying = false;
let audioBuffers = {};
let audioContext = null;

async function initAudioContext(){
  if(audioContext) return;
  audioContext = new (window.AudioContext || window.webkitAudioContext)();
}

async function preloadAudio(){
  await initAudioContext();
  const promises = Object.entries(AUDIO).map(async ([key, path]) => {
    try{
      const res = await fetch(path);
      const arrayBuffer = await res.arrayBuffer();
      const buffer = await audioContext.decodeAudioData(arrayBuffer);
      audioBuffers[key] = buffer;
    }catch(e){
      console.error('음원 로드 실패:', key, e);
    }
  });
  await Promise.all(promises);
}

function pressKey(digit){
  if(isPlaying) return;
  if(audioContext && audioContext.state === 'suspended'){
    audioContext.resume();
  }
  const filledIdx = plateDigits.findIndex(d => d === '');
  if(filledIdx === -1) return;
  plateDigits[filledIdx] = digit;
  renderPlate();
  updateBroadcastBtn();
}

function pressBackspace(){
  if(isPlaying) return;
  for(let i = plateDigits.length - 1; i >= 0; i--){
    if(plateDigits[i] !== ''){
      plateDigits[i] = '';
      break;
    }
  }
  renderPlate();
  updateBroadcastBtn();
}

function pressClear(){
  if(isPlaying) return;
  plateDigits = ['', '', '', ''];
  renderPlate();
  updateBroadcastBtn();
}

function renderPlate(){
  const cells = document.querySelectorAll('.plate-cell');
  const nextIdx = plateDigits.findIndex(d => d === '');
  
  cells.forEach((cell, idx) => {
    cell.textContent = plateDigits[idx];
    cell.classList.remove('filled', 'next');
    if(plateDigits[idx] !== ''){
      cell.classList.add('filled');
    } else if(idx === nextIdx){
      cell.classList.add('next');
    }
  });
  
  const inline = document.getElementById('plate-inline');
  const allFilled = plateDigits.every(d => d !== '');
  if(allFilled){
    inline.textContent = plateDigits.join(' ');
    inline.classList.remove('empty');
  } else {
    const display = plateDigits.map(d => d === '' ? '_' : d).join(' ');
    inline.textContent = display;
    inline.classList.add('empty');
  }
}

function updateBroadcastBtn(){
  const btn = document.getElementById('broadcast-btn');
  const allFilled = plateDigits.every(d => d !== '');
  btn.disabled = !allFilled || isPlaying;
}

async function startBroadcast(){
  if(isPlaying) return;
  if(plateDigits.some(d => d === '')) return;
  
  if(audioContext && audioContext.state === 'suspended'){
    await audioContext.resume();
  }
  
  isPlaying = true;
  updatePlayingUI(true);
  
  try{
    await playAudioTrimmed('chime', TRIM_CHIME);
    await playAudioTrimmed('intro', TRIM_INTRO);
    
    if(REPEAT_NUMBERS){
      await playDigits(true);
      await playDigits(false);
    } else {
      await playDigits(false);
    }
    
    await playAudioTrimmed('outro', TRIM_OUTRO);
    
    showToast('방송 완료');
    
    setTimeout(() => {
      plateDigits = ['', '', '', ''];
      renderPlate();
      isPlaying = false;
      updatePlayingUI(false);
      updateBroadcastBtn();
    }, 800);
    
  }catch(e){
    showToast('⚠ 재생 실패: ' + e.message);
    isPlaying = false;
    updatePlayingUI(false);
    updateBroadcastBtn();
  }
}

async function playDigits(isFirstGroup){
  for(let i = 0; i < plateDigits.length; i++){
    const isLast = (i === plateDigits.length - 1);
    let trim;
    if(isLast){
      trim = isFirstGroup ? TRIM_LAST_DIGIT_FIRST_GROUP : TRIM_LAST_DIGIT;
    } else {
      trim = TRIM_DIGIT;
    }
    await playAudioTrimmed(plateDigits[i], trim);
  }
}

function playAudioTrimmed(key, trimMs){
  return new Promise((resolve, reject) => {
    const buffer = audioBuffers[key];
    if(!buffer || !audioContext){
      reject(new Error('음원을 찾을 수 없음: ' + key));
      return;
    }
    
    const source = audioContext.createBufferSource();
    source.buffer = buffer;
    
    const gainNode = audioContext.createGain();
    const boost = GAIN_BOOST[key] || 1.0;
    gainNode.gain.value = GAIN_GLOBAL * boost;
    
    source.connect(gainNode);
    gainNode.connect(audioContext.destination);
    
    let resolved = false;
    let trimTimer = null;
    
    const finish = () => {
      if(resolved) return;
      resolved = true;
      if(trimTimer) clearTimeout(trimTimer);
      resolve();
    };
    
    source.addEventListener('ended', finish, {once:true});
    
    try{
      source.start(0);
    }catch(err){
      reject(new Error('재생 시작 실패: ' + err.message));
      return;
    }
    
    if(trimMs > 0){
      const durMs = buffer.duration * 1000;
      const trigger = Math.max(0, durMs - trimMs);
      trimTimer = setTimeout(finish, trigger);
    }
  });
}

function updatePlayingUI(playing){
  const btn = document.getElementById('broadcast-btn');
  const text = document.getElementById('broadcast-btn-text');
  const keypad = document.getElementById('keypad');
  
  if(playing){
    btn.classList.add('playing');
    btn.disabled = true;
    text.textContent = '방송 중...';
    keypad.querySelectorAll('button').forEach(b => b.disabled = true);
  } else {
    btn.classList.remove('playing');
    text.textContent = '방송 시작';
    keypad.querySelectorAll('button').forEach(b => b.disabled = false);
  }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

document.addEventListener('keydown', (e) => {
  if(isPlaying) return;
  
  if(e.key >= '0' && e.key <= '9'){
    pressKey(e.key);
  } else if(e.key === 'Backspace'){
    pressBackspace();
  } else if(e.key === 'Escape' || e.key === 'Delete'){
    pressClear();
  } else if(e.key === 'Enter'){
    const btn = document.getElementById('broadcast-btn');
    if(!btn.disabled) startBroadcast();
  }
});

function activateAudioOnFirstInteraction(){
  initAudioContext().then(() => {
    if(audioContext.state === 'suspended'){
      audioContext.resume();
    }
  });
}
document.addEventListener('click', activateAudioOnFirstInteraction, {once:true});
document.addEventListener('touchstart', activateAudioOnFirstInteraction, {once:true});

preloadAudio();
renderPlate();
updateBroadcastBtn();

async function preventScreenLock(){
  if('wakeLock' in navigator){
    try{
      await navigator.wakeLock.request('screen');
    }catch(e){}
  }
}
preventScreenLock();
document.addEventListener('click', preventScreenLock, {once:true});

</script>
</body>
</html>
